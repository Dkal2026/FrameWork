<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Содержимое папки</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* Кнопка Назад */
        .back-button {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .back-button:hover { opacity: 0.8; transform: translateX(-5px); }

        header {
            border-bottom: 1px solid #334155;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .item {
            background: var(--card);
            padding: 20px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            text-align: center;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .item:hover {
            border-color: var(--accent);
            background: #273549;
            transform: scale(1.02);
        }

        .icon { font-size: 32px; display: block; margin-bottom: 10px; }
        .name { font-size: 0.95rem; font-weight: 500; word-break: break-all; }
        
        /* Стиль для файлов (отличие от папок) */
        .file { border-left: 4px solid #94a3b8; }
        .folder { border-left: 4px solid var(--accent); }
    </style>
</head>
<body>
